<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的个人博客</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="记录学术、天文与编程的个人空间">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- 官方经典暗黑/明亮主题切换，对眼睛友好 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <!-- 侧边栏标题 -->
  <div id="app">加载中...</div>
  
  <script>
    window.$docsify = {
      name: '个人主页',
      repo: '', // 如果你想在右上角挂上你的 GitHub 链接，可以填在这里
      loadSidebar: true, // 开启侧边栏
      subMaxLevel: 2,    // 侧边栏显示文章内目录的层级
      coverpage: false,  // 如果想要炫酷的封面，可以改为 true
      // 开启右上角字数统计（可选）
      count:{
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90,90,90)',
        language: 'chinese'
      }
    }
  </script>
  <!-- Docsify 核心驱动 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 字数统计插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-count@latest/dist/countable.min.js"></script>
  <!-- 代码高亮插件（自动支持 Python, C++, Markdown 等） -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
